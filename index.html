<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inner West Watch — What's happening near you</title>
<meta name="description" content="Plain-language summaries of Inner West Council decisions that affect your street — crossings, traffic calming, parking, and speed limits.">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f0f0f0;
    --card:      #ffffff;
    --ink:       #111111;
    --ink2:      #444444;
    --ink3:      #888888;
    --border:    #e4e4e4;
    --accent:    #1a56db;
    --accent-bg: #eff4ff;
    --warn:      #c2410c;
    --warn-bg:   #fff7ed;
    --red:       #dc2626;
    --red-bg:    #fef2f2;
    --grn:       #15803d;
    --grn-bg:    #f0fdf4;
    --ylw:       #92400e;
    --ylw-bg:    #fffbeb;
    --shadow:    0 1px 4px rgba(0,0,0,.08), 0 0 1px rgba(0,0,0,.05);
    --radius:    14px;
    --radius-sm: 8px;
  }

  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    color: var(--ink);
    background: var(--bg);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-eyebrow {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--ink3);
    margin-bottom: 3px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 800;
    color: var(--ink);
    letter-spacing: -.03em;
    line-height: 1.1;
  }
  .header-sub {
    font-size: 13px;
    color: var(--ink3);
    margin-top: 4px;
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .filter-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--ink3);
    margin-right: 2px;
    white-space: nowrap;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--ink2);
    cursor: pointer;
    transition: background .1s, color .1s, border-color .1s;
    white-space: nowrap;
  }
  .chip:hover { background: var(--bg); }
  .chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── PAGE BODY ── */
  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 20px 16px 48px;
  }

  .section-heading {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--ink3);
    margin: 0 0 12px;
  }

  /* ── CARD GRID ── */
  .card-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }
  @media (min-width: 600px) {
    .card-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (min-width: 820px) {
    .card-grid { grid-template-columns: 1fr 1fr 1fr; }
  }

  /* ── ITEM CARD ── */
  .item-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-decoration: none;
    color: inherit;
    transition: box-shadow .15s;
  }
  .item-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,.12), 0 0 1px rgba(0,0,0,.06);
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    align-items: center;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    white-space: nowrap;
  }
  .tag-crossing { background: #dbeafe; color: #1e40af; }
  .tag-latm     { background: #ffedd5; color: #9a3412; }
  .tag-parking  { background: #ede9fe; color: #5b21b6; }
  .tag-speed    { background: #dcfce7; color: #166534; }
  .tag-event    { background: #fce7f3; color: #9d174d; }
  .tag-suburb   { background: var(--bg); color: var(--ink3); font-weight: 600; }

  .card-headline {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--ink);
    letter-spacing: -.01em;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    gap: 8px;
  }
  .card-meeting {
    font-size: 11px;
    color: var(--ink3);
  }
  .status-badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .04em;
    white-space: nowrap;
  }
  .status-on-agenda    { background: var(--ylw-bg); color: var(--ylw); }
  .status-held         { background: #f1f5f9; color: #475569; }
  .status-forum-yes    { background: var(--grn-bg); color: var(--grn); }
  .status-forum-amended{ background: var(--accent-bg); color: var(--accent); }
  .status-forum-no     { background: var(--red-bg); color: var(--red); }
  .status-confirmed    { background: var(--grn-bg); color: var(--grn); }
  .status-works-coming { background: var(--warn-bg); color: var(--warn); }

  .card-link {
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    white-space: nowrap;
  }
  .card-link:hover { text-decoration: underline; }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 48px 0;
    color: var(--ink3);
    font-size: 14px;
  }

  /* ── HIDDEN ── */
  .hidden { display: none !important; }
</style>
</head>
<body>

<header class="header">
  <div class="header-eyebrow">Inner West Council</div>
  <h1>What's happening near you</h1>
  <p class="header-sub">Plain-language summaries of council decisions affecting Inner West streets.</p>
</header>

<div class="filter-bar" id="filterBar">
  <span class="filter-label">Suburb</span>
  <button class="chip active" data-suburb="all" onclick="setFilter('all')">All</button>
</div>

<main class="page">
  <p class="section-heading" id="sectionHeading">18 May 2026 — Local Transport Forum</p>
  <div class="card-grid" id="cardGrid">
    <div class="empty-state">Loading…</div>
  </div>
</main>

<script>
  const TYPE_LABELS = {
    crossing: 'Crossing',
    latm:     'Traffic calming',
    parking:  'Parking',
    speed:    'Speed limit',
    event:    'Event closure',
  };

  const TYPE_CLASS = {
    crossing: 'tag-crossing',
    latm:     'tag-latm',
    parking:  'tag-parking',
    speed:    'tag-speed',
    event:    'tag-event',
  };

  function statusLabel(item) {
    const today = new Date().toISOString().slice(0, 10);
    if (item.status === 'works-coming')   return { text: 'Works coming', cls: 'status-works-coming' };
    if (item.status === 'council-confirmed') return { text: 'Council confirmed', cls: 'status-confirmed' };
    if (item.status === 'forum-yes')      return { text: 'Forum approved', cls: 'status-forum-yes' };
    if (item.status === 'forum-amended')  return { text: 'Approved with changes', cls: 'status-forum-amended' };
    if (item.status === 'forum-no')       return { text: 'Not approved', cls: 'status-forum-no' };
    if (item.status === 'on-agenda') {
      if (item.meetingDate < today) return { text: 'Outcome coming', cls: 'status-held' };
      return { text: 'On the agenda', cls: 'status-on-agenda' };
    }
    return { text: item.status, cls: 'status-on-agenda' };
  }

  function fmtDate(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
  }

  function renderCard(item) {
    const status = statusLabel(item);
    const typeLabel = TYPE_LABELS[item.type] || item.type;
    const typeCls   = TYPE_CLASS[item.type]  || '';

    const suburbTags = item.suburbs.map(s =>
      `<span class="tag tag-suburb">${s}</span>`
    ).join('');

    const linkHref = item.detailPage || item.agendaUrl;
    const linkText = item.detailPage ? 'Full details' : 'Council source';
    const linkTarget = item.detailPage ? '' : ' target="_blank" rel="noopener"';

    return `<a class="item-card" href="${linkHref}"${linkTarget} data-suburbs="${item.suburbs.join(',')}">
  <div class="card-tags">
    <span class="tag ${typeCls}">${typeLabel}</span>
    ${suburbTags}
  </div>
  <div class="card-headline">${item.headline}</div>
  <div class="card-footer">
    <span class="card-meeting">LTF ${fmtDate(item.meetingDate)}</span>
    <span class="status-badge ${status.cls}">${status.text}</span>
  </div>
</a>`;
  }

  let allItems = [];
  let activeFilter = 'all';

  function setFilter(suburb) {
    activeFilter = suburb;
    document.querySelectorAll('#filterBar .chip').forEach(c => {
      c.classList.toggle('active', c.dataset.suburb === suburb);
    });
    renderGrid();
  }

  function renderGrid() {
    const grid = document.getElementById('cardGrid');
    const visible = activeFilter === 'all'
      ? allItems
      : allItems.filter(item => item.suburbs.includes(activeFilter) || item.suburbs.length === 0);

    if (visible.length === 0) {
      grid.innerHTML = '<div class="empty-state">No items for this suburb yet.</div>';
    } else {
      grid.innerHTML = visible.map(renderCard).join('');
    }
  }

  function buildFilterChips(items) {
    const bar = document.getElementById('filterBar');
    const suburbs = [...new Set(items.flatMap(i => i.suburbs))].sort();
    suburbs.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.dataset.suburb = s;
      btn.textContent = s;
      btn.onclick = () => setFilter(s);
      bar.appendChild(btn);
    });
  }
